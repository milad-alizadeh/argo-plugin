# Docs site CI — builds and deploys apps/docs to GitHub Pages on push to main.
# One-time manual precondition this workflow cannot perform itself: enable
# Pages in the repo's Settings → Pages, source "GitHub Actions".
name: docs-deploy

on:
  push:
    branches: [main]
    paths: ['apps/docs/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium (rehype-mermaid build-time SVG rendering)
        working-directory: apps/docs
        run: bunx playwright install --with-deps chromium
      - name: Lint docs style
        working-directory: apps/docs
        run: bun run lint:docs-style
      - name: Build
        working-directory: apps/docs
        run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
