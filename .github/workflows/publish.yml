# Publish @argohq/kit via npm Trusted Publishing (OIDC) — decision 13.
# No long-lived NPM_TOKEN anywhere: the registry trusts this workflow's OIDC
# identity (configure the trusted publisher on npmjs.com for @argohq/kit,
# pointing at this repo + this workflow file). Wired but NOT fired during the
# local bun-link phase — it runs only on a kit release tag; consumers then
# swap "link:@argohq/kit" for "^<version>".
name: publish-kit

on:
  push:
    tags:
      - 'kit-v*'

permissions:
  contents: read
  id-token: write # OIDC — this IS the credential; no NPM_TOKEN secret exists

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Install
        run: bun install --frozen-lockfile
      - name: Test
        run: bun run test
      - name: Lockstep check — tag, kit version, and plugin designLibrary must agree
        run: |
          node - "$GITHUB_REF_NAME" <<'CHECK'
          const tag = process.argv[2].replace(/^kit-v/, '')
          const kit = require('./packages/kit/package.json').version
          const declared = require('./.claude-plugin/plugin.json').designLibrary
          const majMin = kit.split('.').slice(0, 2).join('.')
          if (kit !== tag) { console.error(`tag ${tag} != kit ${kit}`); process.exit(1) }
          if (majMin !== declared) { console.error(`designLibrary ${declared} != kit major.minor ${majMin}`); process.exit(1) }
          console.log(`lockstep ok: kit ${kit}, designLibrary ${declared}`)
          CHECK
      - name: Publish with provenance
        working-directory: packages/kit
        run: npm publish --provenance --access public
